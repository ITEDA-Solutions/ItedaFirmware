name: Build & Deploy OTA (Stable Fixed)

on:
  push:
    branches: [ main ]
  workflow_dispatch:

permissions:
  contents: write
  pages: write
  id-token: write

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest

    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}

    steps:

      # ---------------- CHECKOUT ----------------
      - name: Checkout Code
        uses: actions/checkout@v4

      # ---------------- ARDUINO CLI ----------------
      - name: Setup Arduino CLI
        uses: arduino/setup-arduino-cli@v2

      # ---------------- ESP32 CORE ----------------
      - name: Install ESP32 Platform
        run: |
          arduino-cli config init

          arduino-cli config add board_manager.additional_urls \
          https://raw.githubusercontent.com/espressif/arduino-esp32/gh-pages/package_esp32_index.json

          arduino-cli core update-index
          arduino-cli core install esp32:esp32

      # ---------------- LIBRARIES ----------------
      - name: Install Libraries
        run: |
          arduino-cli lib install "DHT sensor library"
          arduino-cli lib install "Adafruit Unified Sensor"
          arduino-cli lib install "ArduinoJson@6.21.5"
          arduino-cli lib install "PID"

      # ---------------- CLEAN ----------------
      - name: Clean Build Folder
        run: rm -rf ota_build

      # ---------------- COMPILE ----------------
      - name: Compile Firmware
        run: |
          mkdir -p ota_build

          arduino-cli compile \
            --fqbn esp32:esp32:esp32s3:FlashSize=16M,PSRAM=opi,USBMode=hwcdc,CDCOnBoot=cdc,PartitionScheme=app3M_fat9M_16MB \
            --output-dir ./ota_build \
            ItedaFirmware.ino

          echo "Build output:"
          ls -R ota_build

      # ---------------- SAFE BIN EXTRACTION ----------------
      - name: Fix Binary Output
        run: |
          BIN_FILE=$(find ota_build -name "*.bin" | head -n 1)

          if [ -z "$BIN_FILE" ]; then
            echo "ERROR: No binary found!"
            exit 1
          fi

          echo "Found binary: $BIN_FILE"

          cp "$BIN_FILE" ota_build/ItedaFirmware.bin

      # ---------------- VERSION ----------------
      - name: Extract Version
        run: |
          VERSION=$(grep 'VERSION' ItedaFirmware.ino | head -n1 | cut -d'"' -f2)
          echo "VERSION=$VERSION" >> $GITHUB_ENV

      # ---------------- MANIFEST ----------------
      - name: Generate Manifest
        run: |
          REPO_NAME=$(basename "${{ github.repository }}")

          cat > ota_build/manifest.json <<EOF
          {
            "version": "$VERSION",
            "build": "${GITHUB_RUN_NUMBER}",
            "bin_url": "https://${{ github.repository_owner }}.github.io/$REPO_NAME/ItedaFirmware.bin?v=${GITHUB_RUN_NUMBER}"
          }
          EOF

      # ---------------- DEBUG ----------------
      - name: Show Final Files
        run: ls -lah ota_build

      # ---------------- UPLOAD ----------------
      - name: Upload Pages Artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: ./ota_build

      # ---------------- DEPLOY ----------------
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
