name: Build & Deploy OTA

on:
  push:
    branches: [ main ]
  workflow_dispatch:

permissions:
  contents: write
  pages: write
  id-token: write

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Arduino CLI
        uses: arduino/setup-arduino-cli@v2

      - name: Install Platforms & Libs
        run: |
          arduino-cli core update-index
          arduino-cli core install esp32:esp32
          arduino-cli lib install "DHT sensor library" "Adafruit Unified Sensor" "ArduinoJson@6.21.5" "PID"

      - name: Compile
        run: |
          mkdir -p ota_build
          arduino-cli compile --fqbn esp32:esp32:esp32s3 --output-dir ./ota_build ItedaFirmware.ino
          mv ./ota_build/ItedaFirmware.ino.bin ./ota_build/ItedaFirmware.bin

      - name: Generate Sync'd Manifest
        run: |
          # Extract version from .ino to prevent mismatch
          VERSION=$(grep 'const char* VERSION =' ItedaFirmware.ino | cut -d'"' -f2)
          REPO_NAME=$(echo "${{ github.repository }}" | cut -d'/' -f2)
          echo "{
            \"version\": \"$VERSION\",
            \"bin_url\": \"https://${{ github.repository_owner }}.github.io/$REPO_NAME/ItedaFirmware.bin\"
          }" > ota_build/manifest.json

      - name: Upload Artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: ./ota_build

      - name: Deploy
        uses: actions/deploy-pages@v4
