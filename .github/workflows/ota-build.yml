name: Build & Deploy OTA

on:
  push:
    branches: [ main ]
  workflow_dispatch:

permissions:
  contents: write
  pages: write
  id-token: write

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
      
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Setup Arduino CLI
        uses: arduino/setup-arduino-cli@v2

      - name: Install ESP32 Platform
        run: |
          arduino-cli config init
          arduino-cli config add board_manager.additional_urls https://raw.githubusercontent.com/espressif/arduino-esp32/gh-pages/package_esp32_index.json
          arduino-cli core update-index
          arduino-cli core install esp32:esp32

      - name: Install Libraries
        run: |
          arduino-cli lib install "DHT sensor library" "Adafruit Unified Sensor" "ArduinoJson@6.21.5" "PID"

      - name: Compile Firmware
        run: |
          mkdir -p ota_build
          arduino-cli compile --fqbn esp32:esp32:esp32s3 --output-dir ./ota_build ItedaFirmware.ino
          mv ./ota_build/ItedaFirmware.ino.bin ./ota_build/ItedaFirmware.bin

      - name: Generate Sync'd Manifest
        run: |
          # Robust version extraction: Finds the string inside quotes after VERSION
          VERSION=$(sed -n 's/.*VERSION = "\(.*\)";.*/\1/p' ItedaFirmware.ino)
          REPO_NAME=$(echo "${{ github.repository }}" | cut -d'/' -f2)
          
          echo "Building manifest for version: $VERSION"
          
          echo "{
            \"version\": \"$VERSION\",
            \"bin_url\": \"https://${{ github.repository_owner }}.github.io/$REPO_NAME/ItedaFirmware.bin\"
          }" > ota_build/manifest.json

      - name: Upload Pages Artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: ./ota_build

      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
