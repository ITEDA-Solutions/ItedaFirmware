name: Build & Deploy OTA

on:
  push:
    branches:
      - main
  workflow_dispatch: # Allows manual triggering for testing

permissions:
  contents: write
  pages: write      # Added for Pages deployment
  id-token: write

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Setup Arduino CLI
        uses: arduino/setup-arduino-cli@v2

      - name: Install ESP32 Platform
        run: |
          arduino-cli config init
          arduino-cli config add board_manager.additional_urls https://raw.githubusercontent.com/espressif/arduino-esp32/gh-pages/package_esp32_index.json
          arduino-cli core update-index
          arduino-cli core install esp32:esp32

      - name: Install Libraries
        run: |
          arduino-cli lib install "DHT sensor library"
          arduino-cli lib install "Adafruit Unified Sensor"
          arduino-cli lib install "ArduinoJson@6.21.5"
          arduino-cli lib install "PID"

      - name: Compile Firmware
        run: |
          mkdir -p ota_build
          # Compiling for ESP32-S3-WROOM-1 (N16)
          arduino-cli compile --fqbn esp32:esp32:esp32s3 --output-dir ./ota_build ItedaFirmware.ino
          # Standardize filename for the manifest
          mv ./ota_build/ItedaFirmware.ino.bin ./ota_build/ItedaFirmware.bin

      - name: Generate OTA Manifest
        run: |
          # Ensure this URL matches your GitHub username and Repo name
          echo '{
            "version": "v1.0.${{ github.run_number }}",
            "bin_url": "https://${{ github.repository_owner }}.github.io/${{ github.event.repository.name }}/ItedaFirmware.bin"
          }' > ota_build/manifest.json

      - name: Deploy to GitHub Pages
        uses: peaceiris/actions-gh-pages@v4
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_dir: ./ota_build
          publish_branch: gh-pages
          force_push: true
